version: '3.8'

services:
  evload:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - evload-data:/app/backend/data
      - evload-logs:/app/backend/logs
      - ./config.yaml:/app/backend/config.yaml
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  evload-data:
  evload-logs:
