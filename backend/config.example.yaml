demo: false

charging:
  defaultTargetSoc: 80
  defaultAmps: 16
  maxAmps: 32
  minAmps: 5
  balancingHoldMinutes: 10
  batteryCapacityKwh: 75
  rampIntervalSec: 10
  energyPriceEurPerKwh: 0.30

climate:
  defaultTempC: 21

homeAssistant:
  url: "http://homeassistant.local:8123"
  powerEntityId: "sensor.home_power"
  chargerEntityId: "sensor.charger_power"
  maxHomePowerW: 7000
  resumeDelaySec: 30

telegram:
  enabled: false
  allowedChatIds: []
  notifications:
    rules: []

proxy:
  url: "http://localhost:8080"
  vehicleId: ""
  vehicleName: ""
  
  # Polling intervals (ms) - Garage-Reactive Polling system
  # NORMAL mode: fetches vehicle_data every 5s (active charging, schedule imminente, or user in garage)
  normalPollIntervalMs: 5000
  
  # REACTIVE mode: fetches body_controller_state every 5s (sleeping vehicle, NO-WAKE guarantee)
  reactivePollIntervalMs: 5000
  
  # Anticipatory wake lead time (sec) - wakes vehicle before scheduled charge execution
  scheduleLeadTimeSec: 1800
  
  # TLS certificate validation for proxy HTTPS (set false only for self-signed certs in local dev)
  rejectUnauthorized: true
